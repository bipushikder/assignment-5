<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>


    <!-- font-awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!---font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="./style.css">

</head>
<body class="font-geist">
    
     <!-- login form  -->

    <div id="login-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="max-w-md w-full bg-[#ffffff] p-8 rounded-2xl  text-center border border-[#E4E4E7]">
            <div class="mb-6 flex justify-center">
                

                <div ><img src="./images/github-logo.png" alt=""></div>
            </div>
            <h1 class=" text-2xl font-semibold ">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] mt-2">Sign in to manage your issues</p>
            
            <form id="login-form" class="mt-8 space-y-5 text-left">
                <div class="form-control">
                    <label class="label font-semibold text-[#1F2937]">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full text-[#64748B]">
                    <p class="text-left mt-[6px] text-sm text-[#4A00FF]">Default: admin</p>
                </div>
                <div class="form-control">
                    <label class="label font-semibold text-[#1F2937]">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full  text-[#64748B]">
                    <p class="text-left mt-[6px] text-sm text-[#4A00FF]">Default: admin123</p>
                </div>


                <button type="submit" class="btn btn-primary w-full text-white text-lg">Sign In</button>
            </form>
             <h2 class="mt-6 text-[#1F2937]">OR</h2>

             <p class="mt-6 text-[#64748B]">Demo Credentials:</p>

             
            <div class="mt-5 p-3 bg-[#F8FAFC] rounded-lg ">

                <p class="text-[#1F2937] "><span class="font-semibold">Username:</span> admin <br> <span class="font-semibold">Password:</span> admin123</p>


            
            </div>
        </div>
    </div>

     <!-- navbar -->

    <div id="main-page" class="hidden">
        <nav class="navbar bg-[#F8FAFC] border-b px-4 md:px-12 h-20 shadow-sm sticky top-0 z-50">
            <div class="flex-2">

                <div class="flex items-center">
                    <img src="./images/github-logo.png" alt="" class="w-9">
                    <a class="text-2xl font-black text-[#4A00FF] tracking-tight"><span class="text-[#1F2937] font-semibold text-2xl">GitHub Issues Tracker</span></a>
                </div>
                
                
            </div>
            <div class="flex-none gap-3 ">
                <div class="md: join gap-3">

                    <div class="relative">
                         <span class="absolute left-2 top-2 text-[#64748B] ">
                         <i class="fa fa-search"></i>
                        </span>
                         <input id="search-input" type="text" placeholder="Search issues..." 
                         class="pl-8 border rounded h-10 join-item input-md w-40 md:w-72">
                    </div>
                    
                    <button onclick="handleSearch()" class="btn btn-primary join-item rounded-md"><i class="fa-duotone fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>
        </nav>

        
        <!-- all,open and closed tab  -->

        <main class="max-w-7xl mx-auto p-4 md:p-10">

            <div class="flex flex-col md:flex-row justify-between items-center mb-5 gap-3 bg-[#F8FAFC]  p-5 rounded-xl border border-gray-100 shadow-sm">

                <div class="flex flex-wrap items-center gap-6">

                    <div role="tablist" class="tabs tabs-boxed bg-gray-100 p-1">

                        <a id="tab-all" role="tab" class="tab tab-active bg-[#4A00FF]  text-[#64748B]  font-bold px-6" onclick="filterIssues('all', this)">All</a>

                        <a id="tab-open" role="tab" class="tab font-semibold px-6" onclick="filterIssues('open', this)">Open</a>

                        <a id="tab-closed" role="tab" class="tab font-semibold px-6" onclick="filterIssues('closed', this)">Closed</a>

                    </div>
                </div>

            </div>
</main>            



                        <!-- issue count  -->

          <section class="max-w-7xl mx-auto p-4 md:p-10 ">

        
             <div class="flex flex-col md:flex-row justify-between items-center mb-5 gap-3 bg-[#F8FAFC]  p-5 rounded-xl border border-gray-100 shadow-sm">

                    <div class="flex items-center gap-2 text-[#1F2937] ">

                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#4A00FF] " fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                        <img src="./images/Aperture.png" alt="">
                        <div>
                            <span class="font-bold text-sm"> <span id="current-count" class="text-[#1F2937] ">0</span> Issues</span>
                        <p class="flex-none text-[#64748B]">Track and manage your project issues</p>
                        </div>
                        
                    </div>

    

                <div class="flex gap-3 items-center border-l pl-6 border-[#F8FAFC]">
                    <div class="flex items-center gap-2">

                        <div class="w-3 h-3 rounded-full bg-[#00A96E] animate-pulse"></div>
                        <span class="text-sm font-bold text-[#64748B]">Open <span id="open-count"></span></span>
                    </div>


                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                        <span class="text-sm font-bold text-[#64748B]">Closed <span id="closed-count"></span></span>
                    </div>
                </div>
            
            </div>

        </section>                



        




    <script src="./script.js"></script>
</body>
</html>
